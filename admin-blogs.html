<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Journal | NIC Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const NIC_URL = "https://ouuhirckiavcvgqlpriw.supabase.co";
        const NIC_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91dWhpcmNraWF2Y3ZncWxwcml3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTYyNDUsImV4cCI6MjA4OTQ5MjI0NX0.l5diE9bfcRQo8ZSMsAx-alG89GFifGA11hA059zDhXM";
        const nic_supabase = window.supabase.createClient(NIC_URL, NIC_KEY);
    </script>
    <style>
        .admin-sidebar { width: 280px; background: #110d0a; border-right: 1px solid rgba(255,255,255,0.05); padding: 2.5rem; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .admin-nav-link { display: flex; align-items: center; gap: 1rem; padding: 1rem; color: #888; text-decoration: none; border-radius: 12px; margin-bottom: 0.5rem; transition: 0.3s; }
        .admin-nav-link:hover, .admin-nav-link.active { background: rgba(193, 154, 107, 0.1); color: #c29a5b; }
        .admin-main { margin-left: 280px; flex: 1; padding: 4rem; }

        /* Mobile Admin Fix */
        @media (max-width: 992px) {
            .admin-sidebar { width: 100%; height: auto; position: relative; padding: 1.5rem; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .admin-nav { display: flex; overflow-x: auto; gap: 1rem; margin-bottom: 0; }
            .admin-nav-link { margin-bottom: 0; white-space: nowrap; padding: 0.8rem 1.2rem; }
            .admin-main { margin-left: 0; padding: 2rem; }
            .manager-grid { grid-template-columns: 1fr; gap: 2rem; }
            .admin-logo { margin-bottom: 1.5rem !important; }
        }
        .manager-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 4rem; }
        .manager-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 3rem; border-radius: 20px; }
        input, textarea, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; border-radius: 8px; color: #fff; margin-bottom: 1.5rem; outline: none; }
        
        .upload-area { border: 2px dashed rgba(255,255,255,0.1); padding: 2rem; border-radius: 12px; text-align: center; cursor: pointer; transition: var(--transition); margin-bottom: 1.5rem; }
        .upload-area:hover { border-color: var(--secondary); background: rgba(193, 154, 107, 0.05); }
        .upload-preview { width: 100%; height: 200px; border-radius: 8px; object-fit: cover; margin-top: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="admin-sidebar">
        <div class="admin-logo" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 4rem;">
            <img src="tess.jpeg" alt="Logo" style="height: 40px; border-radius: 6px;">
            <span style="font-weight: 800; letter-spacing: 1px;">NIC ADMIN</span>
        </div>
        <nav class="admin-nav">
            <a href="admin-dashboard.html" class="admin-nav-link">
                <i class="fas fa-chart-line"></i> Overview
            </a>
            <a href="admin-products.html" class="admin-nav-link">
                <i class="fas fa-shopping-bag"></i> Products
            </a>
            <a href="admin-blogs.html" class="admin-nav-link active">
                <i class="fas fa-pen-nib"></i> Blog Posts
            </a>
            <a href="#" class="admin-nav-link">
                <i class="fas fa-users"></i> Students
            </a>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05);">
                <p style="font-size: 0.6rem; color: #555; text-transform: uppercase; margin-bottom: 1rem; letter-spacing: 1px;">Website Shortcuts</p>
                <a href="index.html" class="admin-nav-link" style="font-size: 0.8rem; opacity: 0.7;">
                    <i class="fas fa-home"></i> Go to Home
                </a>
                <a href="shop.html" class="admin-nav-link" style="font-size: 0.8rem; opacity: 0.7;">
                    <i class="fas fa-shopping-cart"></i> View Shop
                </a>
                <a href="blog.html" class="admin-nav-link" style="font-size: 0.8rem; opacity: 0.7;">
                    <i class="fas fa-newspaper"></i> View Journal
                </a>
            </div>
        </nav>
    </div>

    <main class="admin-main">
        <h1 style="margin-bottom: 3rem;">Journal Management</h1>

        <div class="manager-grid">
            <div class="manager-card">
                <h3>Write New Entry</h3>
                <form id="add-blog-form">
                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Headline</label>
                    <input type="text" placeholder="e.g. Mastering the V60" required>
                    
                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Category / Tag</label>
                    <input type="text" placeholder="e.g. Brewing Tips">
                    
                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Cover Image</label>
                    <div class="upload-area" id="drop-zone">
                        <i class="fas fa-image" style="font-size: 2rem; color: var(--secondary); margin-bottom: 1rem;"></i>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">Drop Cover Photo Here</p>
                        <input type="file" id="file-input" accept="image/*" style="display: none;">
                        <img id="preview-img" class="upload-preview">
                    </div>

                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Story Body</label>
                    <textarea placeholder="Write your insight..." rows="6" required></textarea>
                    
                    <button type="submit" class="btn" style="width: 100%;">Publish to Journal</button>
                </form>
            </div>

            <div class="manager-card" style="background: transparent;">
                <h3>Published Stories</h3>
                <div style="margin-top: 2rem;" id="blog-list"></div>
            </div>
        </div>
    </main>

    <script>
        if (localStorage.getItem('nic_admin_auth') !== 'true') { window.location.href = 'admin-login.html'; }

        const blogList = document.getElementById('blog-list');
        const addForm = document.getElementById('add-blog-form');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const previewImg = document.getElementById('preview-img');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        loadBlogs();

        async function loadBlogs() {
            try {
                const { data, error } = await nic_supabase.from('academy_journal').select('*').order('publish_date', { ascending: false });
                if (error) throw error;
                let html = '';
                data.forEach(post => {
                    html += `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 1rem;">
                            <div style="display: flex; gap: 1rem; align-items: center;">
                                <img src="${post.cover_image}" style="width: 40px; height: 40px; border-radius: 4px; object-fit: cover;">
                                <div>
                                    <h5 style="margin: 0; font-size: 0.8rem;">${post.headline}</h5>
                                    <span style="font-size: 0.6rem; color: var(--secondary);">${post.hub_tag}</span>
                                </div>
                            </div>
                            <i class="fas fa-trash" onclick="deleteBlog('${post.id}')" style="cursor: pointer; color: #ff4d4d;"></i>
                        </div>
                    `;
                });
                blogList.innerHTML = html || '<p style="color: var(--text-muted); font-size: 0.8rem;">Empty journal.</p>';
            } catch (err) { console.error(err); }
        }

        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Publishing...';
            btn.disabled = true;

            try {
                const file = fileInput.files[0];
                if (!file) throw new Error("Please select a cover image.");

                const fileName = `blog_${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await nic_supabase.storage
                    .from('media')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = nic_supabase.storage.from('media').getPublicUrl(fileName);

                const title = e.target.querySelectorAll('input')[0].value;
                const tag = e.target.querySelectorAll('input')[1].value;
                const content = e.target.querySelector('textarea').value;

                const { error: dbError } = await nic_supabase.from('academy_journal').insert([
                    { headline: title, hub_tag: tag, cover_image: publicUrl, story_body: content }
                ]);

                if (dbError) throw dbError;
                addForm.reset();
                previewImg.style.display = 'none';
                loadBlogs();
                alert('Success! Story published.');
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.innerText = 'Publish to Journal';
                btn.disabled = false;
            }
        });

        window.deleteBlog = async (id) => {
            if (confirm('Delete this story?')) {
                const { error } = await nic_supabase.from('academy_journal').delete().eq('id', id);
                if (error) alert(error.message); else loadBlogs();
            }
        };
    </script>
</body>
</html>
