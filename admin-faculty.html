    <style>
        body { background: #0a0807; display: flex; min-height: 100vh; color: #fff; }
        .admin-sidebar { width: 280px; background: #110d0a; border-right: 1px solid rgba(255,255,255,0.05); padding: 2.5rem; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .admin-nav-link { display: flex; align-items: center; gap: 1rem; padding: 1rem; color: #888; text-decoration: none; border-radius: 12px; margin-bottom: 0.5rem; transition: 0.3s; }
        .admin-nav-link:hover, .admin-nav-link.active { background: rgba(193, 154, 107, 0.1); color: #c29a5b; }
        .admin-main { margin-left: 280px; flex: 1; padding: 4rem; }
        
        .manager-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 4rem; }
        .manager-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 3rem; border-radius: 20px; }
        input, textarea, select { width: 100%; background: #1a1512; border: 1.5px solid rgba(255,255,255,0.15); padding: 1.2rem; border-radius: 10px; color: #ffffff; margin-bottom: 1.5rem; outline: none; transition: var(--transition); }
        input:focus, textarea:focus, select:focus { border-color: var(--secondary); background: #261f1a; box-shadow: 0 0 10px rgba(194, 154, 91, 0.25); }
        select option { background-color: #110d0a; color: #fff; }
        ::placeholder { color: rgba(255,255,255,0.4); }
        
        .upload-area { border: 2px dashed rgba(255,255,255,0.1); padding: 2rem; border-radius: 12px; text-align: center; cursor: pointer; transition: var(--transition); margin-bottom: 1.5rem; }
        .upload-area:hover { border-color: var(--secondary); background: rgba(193, 154, 107, 0.05); }
        .upload-preview { width: 100%; height: 200px; border-radius: 8px; object-fit: cover; margin-top: 1rem; display: none; }
    </style>
</head>
<body class="admin-body">
    <div class="admin-sidebar">
        <div class="admin-logo" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 4rem;">
            <img src="tess.jpeg" alt="Logo" style="height: 40px; border-radius: 6px;">

        <nav class="admin-nav">
            <a href="admin-dashboard.html" class="admin-nav-link">

            <a href="admin-products.html" class="admin-nav-link">

            <a href="admin-blogs.html" class="admin-nav-link">
                <i class="fas fa-pen-nib"></i> Blog Posts
            </a>
            <a href="admin-courses.html" class="admin-nav-link">
                <i class="fas fa-graduation-cap"></i> Manage Courses
            </a>
            <a href="admin-faculty.html" class="admin-nav-link active">
                <i class="fas fa-users-cog"></i> Manage Faculty
            </a>
            <a href="admin-students.html" class="admin-nav-link">

            </a>
            <a href="admin-guide.html" class="admin-nav-link" style="background: rgba(193, 154, 107, 0.05); border: 1px solid rgba(193, 154, 107, 0.2);">
                <i class="fas fa-book" style="color: var(--secondary);"></i> <span style="color: var(--secondary);">Admin Guide</span>
            </a>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05);">
                <p style="font-size: 0.6rem; color: #555; text-transform: uppercase; margin-bottom: 1rem; letter-spacing: 1px;">Website Shortcuts</p>
                <a href="index.html" class="admin-nav-link" style="font-size: 0.8rem; opacity: 0.7;">
                    <i class="fas fa-home"></i> Go to Home
                </a>
                <a href="shop.html" class="admin-nav-link" style="font-size: 0.8rem; opacity: 0.7;">
                    <i class="fas fa-shopping-cart"></i> View Shop
                </a>
                <a href="blog.html" class="admin-nav-link" style="font-size: 0.8rem; opacity: 0.7;">
                    <i class="fas fa-newspaper"></i> View Journal
                </a>
            </div>

    <main class="admin-main">
        <h1 style="margin-bottom: 3rem;">Faculty Management</h1>

        <div class="manager-grid">
            <div class="manager-card">
                <h3>Add Faculty Member</h3>
                <form id="add-faculty-form">
                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Full Name</label>
                    <input type="text" id="faculty-name" placeholder="e.g. James Kamau" required>
                    
                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Professional Title / Role</label>
                    <input type="text" id="faculty-role" placeholder="e.g. Lead Barista Instructor" required>
                    
                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Profile Photo</label>
                    <div class="upload-area" id="drop-zone">
                        <i class="fas fa-camera" style="font-size: 2rem; color: var(--secondary); margin-bottom: 1rem;"></i>
                        <p style="font-size: 0.85rem; color: var(--text-muted);">Drop Profile Photo Here</p>
                        <input type="file" id="file-input" accept="image/*" style="display: none;">
                        <img id="preview-img" class="upload-preview">
                    </div>

                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Short Bio / Credentials</label>
                    <textarea id="faculty-bio" placeholder="e.g. Certified SCA Professional with 7+ years of experience training competition-level baristas..." rows="5" required></textarea>
                    
                    <button type="submit" class="btn" style="width: 100%;">Add to Faculty</button>
                </form>
            </div>

            <div class="manager-card" style="background: transparent;">
                <h3>Current Faculty List</h3>
                <div style="margin-top: 2rem;" id="faculty-list"></div>
            </div>
        </div>
    </main>

    <script>
        if (localStorage.getItem('nic_admin_auth') !== 'true') { window.location.href = 'admin-login.html'; }

        const facultyList = document.getElementById('faculty-list');
        const addForm = document.getElementById('add-faculty-form');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const previewImg = document.getElementById('preview-img');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        loadFaculty();

        async function loadFaculty() {
            try {
                const { data, error } = await nic_supabase
                    .from('academy_journal')
                    .select('*')
                    .eq('hub_tag', '[FACULTY]')
                    .order('publish_date', { ascending: false });

                if (error) throw error;
                let html = '';
                data.forEach(post => {
                    const parts = post.story_body.split('|');
                    const role = parts[0] || 'Instructor';
                    html += `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 1.2rem; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.05);">
                            <div style="display: flex; gap: 1rem; align-items: center;">
                                <img src="${post.cover_image}" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--secondary);">
                                <div>
                                    <h5 style="margin: 0; font-size: 0.9rem; color: #fff;">${post.headline}</h5>
                                    <span style="font-size: 0.7rem; color: var(--secondary); font-weight: 600;">${role}</span>
                                </div>
                            </div>
                            <i class="fas fa-trash" onclick="deleteFaculty('${post.id}')" style="cursor: pointer; color: #ff4d4d; padding: 0.5rem; transition: 0.3s;" onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=1"></i>
                        </div>
                    `;
                });
                facultyList.innerHTML = html || '<p style="color: var(--text-muted); font-size: 0.85rem;">No dynamic faculty members added yet. Showing default static roster on public site.</p>';
            } catch (err) { console.error(err); }
        }

        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Adding...';
            btn.disabled = true;

            try {
                const file = fileInput.files[0];
                if (!file) throw new Error("Please select a profile photo.");

                const fileName = `faculty_${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await nic_supabase.storage
                    .from('media')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = nic_supabase.storage.from('media').getPublicUrl(fileName);

                const name = document.getElementById('faculty-name').value;
                const role = document.getElementById('faculty-role').value;
                const bio = document.getElementById('faculty-bio').value;
                
                // Polymorphic storage: store role and bio separated by "|"
                const combinedBody = `${role}|${bio}`;

                const { error: dbError } = await nic_supabase.from('academy_journal').insert([
                    { 
                        headline: name, 
                        hub_tag: '[FACULTY]', 
                        cover_image: publicUrl, 
                        story_body: combinedBody 
                    }
                ]);

                if (dbError) throw dbError;
                addForm.reset();
                previewImg.style.display = 'none';
                loadFaculty();
                alert('Success! Faculty member added.');
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.innerText = 'Add to Faculty';
                btn.disabled = false;
            }
        });

        window.deleteFaculty = async (id) => {
            if (confirm('Delete this faculty member?')) {
                try {
                    const queryId = isNaN(id) ? id : Number(id);
                    console.log('Attempting to delete faculty member with ID:', queryId);
                    const { error } = await nic_supabase.from('academy_journal').delete().eq('id', queryId);
                    if (error) {
                        console.error('Database delete error:', error);
                        alert('Delete failed: ' + error.message);
                    } else {
                        loadFaculty();
                    }
                } catch (err) {
                    console.error('Caught error during delete:', err);
                    alert('An unexpected error occurred: ' + err.message);
                }
            }
        };

        // Dynamic Mobile Sidebar Navigation & Hamburger Setup
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.querySelector('.admin-sidebar');
            if (sidebar) {
                // 1. Create Mobile Top Bar
                const mobileHeader = document.createElement('div');
                mobileHeader.className = 'admin-mobile-header';
                mobileHeader.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.8rem;">
                        <img src="tess.jpeg" style="height: 32px; border-radius: 4px; object-fit: cover;">
                        <span style="font-weight: 800; letter-spacing: 1px; font-size: 0.9rem; color: #fff;">NIC ADMIN</span>
                    </div>
                    <button id="admin-hamburger" style="background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; padding: 0.5rem;">
                        <i class="fas fa-bars"></i>
                    </button>
                `;
                document.body.prepend(mobileHeader);

                // 2. Create Overlay
                const overlay = document.createElement('div');
                overlay.className = 'admin-overlay';
                document.body.appendChild(overlay);

                // 3. Create Close Button inside Sidebar
                const closeBtn = document.createElement('i');
                closeBtn.className = 'fas fa-times close-sidebar';
                sidebar.prepend(closeBtn);

                // 4. Bind Toggle Events
                const hamburger = document.getElementById('admin-hamburger');
                const openSidebar = () => {
                    sidebar.classList.add('open');
                    overlay.classList.add('active');
                };
                const closeSidebar = () => {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('active');
                };

                hamburger.addEventListener('click', openSidebar);
                closeBtn.addEventListener('click', closeSidebar);
                overlay.addEventListener('click', closeSidebar);
            }
        });
    </script>
</body>
</html>
