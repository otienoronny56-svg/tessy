<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#1b1918"/>
  
  <!-- Outer Decorative Circles -->
  <circle cx="300" cy="260" r="145" fill="none" stroke="#d4af37" stroke-width="2" stroke-dasharray="6 6"/>
  <circle cx="300" cy="260" r="160" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1"/>

  <!-- Barista Portafilter Icon (Front View) -->
  <!-- Basket -->
  <path d="M 230 230 L 370 230 L 350 290 C 330 320 270 320 250 290 Z" fill="none" stroke="#f5f5f5" stroke-width="8" stroke-linejoin="round"/>
  
  <!-- Portafilter Ears -->
  <rect x="210" y="230" width="20" height="10" fill="#f5f5f5" rx="3"/>
  <rect x="370" y="230" width="20" height="10" fill="#f5f5f5" rx="3"/>
  
  <!-- Dual Spouts -->
  <path d="M 285 315 L 285 340 C 285 350 270 350 270 350" fill="none" stroke="#f5f5f5" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 315 315 L 315 340 C 315 350 330 350 330 350" fill="none" stroke="#f5f5f5" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Espresso Drops -->
  <path d="M 270 365 L 270 375" fill="none" stroke="#d4af37" stroke-width="5" stroke-linecap="round"/>
  <circle cx="270" cy="385" r="4" fill="#d4af37"/>
  
  <path d="M 330 360 L 330 370" fill="none" stroke="#d4af37" stroke-width="5" stroke-linecap="round"/>
  <circle cx="330" cy="380" r="4" fill="#d4af37"/>
  
  <!-- Tamper Hovering Above -->
  <path d="M 265 140 L 335 140 L 330 180 L 270 180 Z" fill="none" stroke="#d4af37" stroke-width="4" stroke-linejoin="round"/>
  <path d="M 290 85 L 310 85 L 310 140 L 290 140 Z" fill="#d4af37"/>
  <circle cx="300" cy="80" r="22" fill="#d4af37"/>

  <!-- Text Elements -->
  <text x="300" y="480" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="5">NAIROBI INSTITUTE</text>
  <text x="300" y="530" font-family="'Georgia', serif" font-size="24" font-style="italic" fill="#d4af37" text-anchor="middle" letter-spacing="8">OF COFFEE</text>
  
  <!-- Bottom Decorative Element -->
  <line x1="260" y1="565" x2="340" y2="565" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <polygon points="300,560 305,565 300,570 295,565" fill="#d4af37"/>
</svg>
