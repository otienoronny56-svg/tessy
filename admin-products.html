    <style>
        :root { --sidebar-width: 280px; }
        body { background: #0a0807; display: flex; min-height: 100vh; }
        .admin-sidebar { width: 280px; background: #110d0a; border-right: 1px solid rgba(255,255,255,0.05); padding: 2.5rem; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .admin-nav-link { display: flex; align-items: center; gap: 1rem; padding: 1rem; color: #888; text-decoration: none; border-radius: 12px; margin-bottom: 0.5rem; transition: 0.3s; }
        .admin-nav-link:hover, .admin-nav-link.active { background: rgba(193, 154, 107, 0.1); color: #c29a5b; }
        .admin-main { margin-left: 280px; flex: 1; padding: 4rem; }

        .manager-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 3rem; border-radius: 20px; }
        input, textarea, select { width: 100%; background: #1a1512; border: 1.5px solid rgba(255,255,255,0.15); padding: 1.2rem; border-radius: 10px; color: #ffffff; margin-bottom: 1.5rem; outline: none; transition: var(--transition); }
        input:focus, textarea:focus, select:focus { border-color: var(--secondary); background: #261f1a; box-shadow: 0 0 10px rgba(194, 154, 91, 0.25); }
        select option { background-color: #110d0a; color: #fff; }
        ::placeholder { color: rgba(255,255,255,0.4); }
        
        /* Upload Area */
        .upload-area { border: 2px dashed rgba(255,255,255,0.1); padding: 2rem; border-radius: 12px; text-align: center; cursor: pointer; transition: var(--transition); margin-bottom: 1.5rem; }
        .upload-area:hover { border-color: var(--secondary); background: rgba(193, 154, 107, 0.05); }
        .upload-preview { width: 100%; height: 150px; border-radius: 8px; object-fit: cover; margin-top: 1rem; display: none; }
    </style>

<body class="admin-body">
    <div class="admin-sidebar">

            <img src="tess.jpeg" alt="Logo" style="height: 40px; border-radius: 6px;">

        </div>
        <nav class="admin-nav">

                <i class="fas fa-chart-line"></i> Overview
            </a>
            <a href="admin-products.html" class="admin-nav-link active">

            <a href="admin-blogs.html" class="admin-nav-link">
                <i class="fas fa-pen-nib"></i> Blog Posts
            </a>
            <a href="admin-courses.html" class="admin-nav-link">

            </a>
            <a href="admin-faculty.html" class="admin-nav-link">
                <i class="fas fa-users-cog"></i> Manage Faculty
            </a>
            <a href="admin-students.html" class="admin-nav-link">
                <i class="fas fa-users"></i> Students
            </a>
            <a href="admin-guide.html" class="admin-nav-link" style="background: rgba(193, 154, 107, 0.05); border: 1px solid rgba(193, 154, 107, 0.2);">
                <i class="fas fa-book" style="color: var(--secondary);"></i> <span style="color: var(--secondary);">Admin Guide</span>
            </a>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05);">
                <p style="font-size: 0.6rem; color: #555; text-transform: uppercase; margin-bottom: 1rem; letter-spacing: 1px;">Website Shortcuts</p>
                <a href="index.html" class="admin-nav-link" style="font-size: 0.8rem; opacity: 0.7;">
                    <i class="fas fa-home"></i> Go to Home
                </a>
                <a href="shop.html" class="admin-nav-link" style="font-size: 0.8rem; opacity: 0.7;">
                    <i class="fas fa-shopping-cart"></i> View Shop
                </a>
                <a href="blog.html" class="admin-nav-link" style="font-size: 0.8rem; opacity: 0.7;">
                    <i class="fas fa-newspaper"></i> View Journal
                </a>
            </div>
        </nav>

    <main class="admin-main">
        <h1 style="margin-bottom: 3rem;">Product Management</h1>

        <div class="product-manager-grid">
            <div class="manager-card">
                <h3>Add New Item</h3>
                <form id="add-product-form">
                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Product Name</label>
                    <input type="text" placeholder="e.g. Arabica Dark Roast" required>
                    
                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Price (KES)</label>
                    <input type="number" placeholder="2500" required>
                    
                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Category</label>
                    <select>
                        <option>Coffee Beans</option>
                        <option>Coffee Machines & Grinders</option>
                        <option>Brewing Equipment</option>
                        <option>Merchandise</option>
                        <option>Coffee Accessories</option>
                    </select>

                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Product Image</label>
                    <div class="upload-area" id="drop-zone">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: var(--secondary); margin-bottom: 1rem;"></i>
                        <p style="font-size: 0.8rem; color: var(--text-muted);">Click or Drag Photo Here</p>
                        <input type="file" id="file-input" accept="image/*" style="display: none;">
                        <img id="preview-img" class="upload-preview">
                    </div>

                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Description</label>
                    <textarea placeholder="Describe flavor notes..." rows="3"></textarea>
                    
                    <button type="submit" class="btn" style="width: 100%;">List Product for Sale</button>
                </form>
            </div>

            <div class="manager-card" style="background: transparent;">
                <h3>Current Collection</h3>
                <div style="margin-top: 2rem;" id="current-collection"></div>
            </div>
        </div>
    </main>

    <script>
        if (localStorage.getItem('nic_admin_auth') !== 'true') { window.location.href = 'admin-login.html'; }

        const productList = document.getElementById('current-collection');
        const addForm = document.getElementById('add-product-form');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const previewImg = document.getElementById('preview-img');

        // Drag & Drop Preview
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        loadProducts();

        async function loadProducts() {
            try {
                const { data, error } = await nic_supabase.from('coffee_stock').select('*').order('added_on', { ascending: false });
                if (error) throw error;
                let html = '';
                data.forEach(product => {
                    html += `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 1rem;">
                            <div style="display: flex; gap: 1rem; align-items: center;">
                                <img src="${product.visual_asset}" style="width: 40px; height: 40px; border-radius: 4px; object-fit: cover;">
                                <div>
                                    <h5 style="margin: 0;">${product.item_label}</h5>
                                    <span style="font-size: 0.7rem; color: var(--secondary);">KES ${product.cost_kes.toLocaleString()}</span>
                                </div>
                            </div>
                            <i class="fas fa-trash" onclick="deleteProduct('${product.id}')" style="cursor: pointer; color: #ff4d4d;"></i>
                        </div>
                    `;
                });
                productList.innerHTML = html || '<p style="color: var(--text-muted); font-size: 0.8rem;">Empty collection.</p>';
            } catch (err) { console.error(err); }
        }

        addForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Uploading...';
            btn.disabled = true;

            try {
                const file = fileInput.files[0];
                if (!file) throw new Error("Please select an image.");

                // 1. Upload to Supabase Storage
                const fileName = `${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await nic_supabase.storage
                    .from('media')
                    .upload(fileName, file);

                if (uploadError) throw uploadError;

                // 2. Get Public URL
                const { data: { publicUrl } } = nic_supabase.storage.from('media').getPublicUrl(fileName);

                // 3. Save to Database
                const name = e.target.querySelectorAll('input')[0].value;
                const price = e.target.querySelectorAll('input')[1].value;
                const category = e.target.querySelector('select').value;
                const desc = e.target.querySelector('textarea').value;

                const { error: dbError } = await nic_supabase.from('coffee_stock').insert([
                    { item_label: name, cost_kes: parseInt(price), bean_type: category, tasting_notes: desc, visual_asset: publicUrl }
                ]);

                if (dbError) throw dbError;
                addForm.reset();
                previewImg.style.display = 'none';
                loadProducts();
                alert('Success! Product listed.');
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.innerText = 'List Product for Sale';
                btn.disabled = false;
            }
        });

        window.deleteProduct = async (id) => {
            if (confirm('Delete this item?')) {
                try {
                    const queryId = isNaN(id) ? id : Number(id);
                    console.log('Attempting to delete product with ID:', queryId);
                    const { error } = await nic_supabase.from('coffee_stock').delete().eq('id', queryId);
                    if (error) {
                        console.error('Database delete error:', error);
                        alert('Delete failed: ' + error.message);
                    } else {
                        loadProducts();
                    }
                } catch (err) {
                    console.error('Caught error during delete:', err);
                    alert('An unexpected error occurred: ' + err.message);
                }
            }
        };

        // Dynamic Mobile Sidebar Navigation & Hamburger Setup
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.querySelector('.admin-sidebar');
            if (sidebar) {
                // 1. Create Mobile Top Bar
                const mobileHeader = document.createElement('div');
                mobileHeader.className = 'admin-mobile-header';
                mobileHeader.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.8rem;">
                        <img src="tess.jpeg" style="height: 32px; border-radius: 4px; object-fit: cover;">
                        <span style="font-weight: 800; letter-spacing: 1px; font-size: 0.9rem; color: #fff;">NIC ADMIN</span>
                    </div>
                    <button id="admin-hamburger" style="background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; padding: 0.5rem;">
                        <i class="fas fa-bars"></i>
                    </button>
                `;
                document.body.prepend(mobileHeader);

                // 2. Create Overlay
                const overlay = document.createElement('div');
                overlay.className = 'admin-overlay';
                document.body.appendChild(overlay);

                // 3. Create Close Button inside Sidebar
                const closeBtn = document.createElement('i');
                closeBtn.className = 'fas fa-times close-sidebar';
                sidebar.prepend(closeBtn);

                // 4. Bind Toggle Events
                const hamburger = document.getElementById('admin-hamburger');
                const openSidebar = () => {
                    sidebar.classList.add('open');
                    overlay.classList.add('active');
                };
                const closeSidebar = () => {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('active');
                };

                hamburger.addEventListener('click', openSidebar);
                closeBtn.addEventListener('click', closeSidebar);
                overlay.addEventListener('click', closeSidebar);
            }
        });
    </script>
</body>
</html>
