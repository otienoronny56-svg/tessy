<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses | NIC Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const NIC_URL = "https://ouuhirckiavcvgqlpriw.supabase.co";
        const NIC_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91dWhpcmNraWF2Y3ZncWxwcml3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTYyNDUsImV4cCI6MjA4OTQ5MjI0NX0.l5diE9bfcRQo8ZSMsAx-alG89GFifGA11hA059zDhXM";
        const nic_supabase = window.supabase.createClient(NIC_URL, NIC_KEY);
    </script>
    <style>
        body { background: #0a0807; display: flex; min-height: 100vh; color: #fff; }
        .admin-sidebar { width: 280px; background: #110d0a; border-right: 1px solid rgba(255,255,255,0.05); padding: 2.5rem; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .admin-nav-link { display: flex; align-items: center; gap: 1rem; padding: 1rem; color: #888; text-decoration: none; border-radius: 12px; margin-bottom: 0.5rem; transition: 0.3s; }
        .admin-nav-link:hover, .admin-nav-link.active { background: rgba(193, 154, 107, 0.1); color: #c29a5b; }
        .admin-main { margin-left: 280px; flex: 1; padding: 4rem; }
        
        .manager-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 4rem; }
        .manager-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 3rem; border-radius: 20px; }
        input, textarea, select { width: 100%; background: #1a1512; border: 1.5px solid rgba(255,255,255,0.15); padding: 1.2rem; border-radius: 10px; color: #ffffff; margin-bottom: 1.5rem; outline: none; transition: var(--transition); }
        input:focus, textarea:focus, select:focus { border-color: var(--secondary); background: #261f1a; box-shadow: 0 0 10px rgba(194, 154, 91, 0.25); }
        select option { background-color: #110d0a; color: #fff; }
        ::placeholder { color: rgba(255,255,255,0.4); }
        
        .upload-area { border: 2px dashed rgba(255,255,255,0.1); padding: 2rem; border-radius: 12px; text-align: center; cursor: pointer; transition: var(--transition); margin-bottom: 1.5rem; }
        .upload-area:hover { border-color: var(--secondary); background: rgba(193, 154, 107, 0.05); }
        .upload-preview { width: 100%; height: 180px; border-radius: 8px; object-fit: cover; margin-top: 1rem; display: none; }
    </style>
</head>
<body class="admin-body">
    <div class="admin-sidebar">
        <div class="admin-logo" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 4rem;">
            <img src="tess.jpeg" alt="Logo" style="height: 40px; border-radius: 6px;">
            <span style="font-weight: 800; letter-spacing: 1px;">NIC ADMIN</span>
        </div>
        <nav class="admin-nav">
            <a href="admin-dashboard.html" class="admin-nav-link">
                <i class="fas fa-chart-line"></i> Overview
            </a>
            <a href="admin-products.html" class="admin-nav-link">
                <i class="fas fa-shopping-bag"></i> Products
            </a>
            <a href="admin-blogs.html" class="admin-nav-link">
                <i class="fas fa-pen-nib"></i> Blog Posts
            </a>
            <a href="admin-courses.html" class="admin-nav-link active">
                <i class="fas fa-graduation-cap"></i> Manage Courses
            </a>
            <a href="admin-faculty.html" class="admin-nav-link">
                <i class="fas fa-users-cog"></i> Manage Faculty
            </a>
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05);">
                <p style="font-size: 0.6rem; color: #555; text-transform: uppercase; margin-bottom: 1rem; letter-spacing: 1px;">Website Shortcuts</p>
                <a href="index.html" class="admin-nav-link" style="font-size: 0.8rem; opacity: 0.7;">
                     <i class="fas fa-home"></i> Go to Home
                </a>
                <a href="courses.html" class="admin-nav-link" style="font-size: 0.8rem; opacity: 0.7;">
                     <i class="fas fa-graduation-cap"></i> View Courses
                </a>
            </div>
        </nav>
    </div>

    <main class="admin-main">
        <h1 style="margin-bottom: 3rem;">Course Management</h1>

        <div class="manager-grid">
            <div class="manager-card">
                <h3 id="form-title">Add Course Program</h3>
                <form id="course-form">
                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Course Title</label>
                    <input type="text" id="course-title" placeholder="e.g. Barista Foundations" required>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Duration</label>
                            <input type="text" id="course-duration" placeholder="e.g. 5 Days" required>
                        </div>
                        <div>
                            <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Skill Level</label>
                            <input type="text" id="course-level" placeholder="e.g. SCA Standard" required>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div>
                            <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Price (KES)</label>
                            <input type="text" id="course-price" placeholder="e.g. 25,000" required>
                        </div>
                        <div>
                            <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Icon representation</label>
                            <select id="course-icon-class">
                                <option value="fas fa-mug-hot">Coffee Mug (Standard)</option>
                                <option value="fas fa-wind">Wind/Aroma (Sensory)</option>
                                <option value="fas fa-palette">Palette (Latte Art)</option>
                                <option value="fas fa-coffee">Coffee Beans</option>
                                <option value="fas fa-mortar-pestle">Grinder/Pestle</option>
                                <option value="fas fa-award">Award (Mastery)</option>
                            </select>
                        </div>
                    </div>
                    
                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Cover Photo (Optional)</label>
                    <div class="upload-area" id="drop-zone">
                        <i class="fas fa-camera" style="font-size: 2rem; color: var(--secondary); margin-bottom: 1rem;"></i>
                        <p style="font-size: 0.85rem; color: var(--text-muted);">Drop Cover Photo Here</p>
                        <input type="file" id="file-input" accept="image/*" style="display: none;">
                        <img id="preview-img" class="upload-preview">
                    </div>

                    <label style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;">Short Description</label>
                    <textarea id="course-description" placeholder="Perfect for beginners. Learn machine maintenance, espresso basics, and milk steaming..." rows="4" required></textarea>
                    
                    <div style="display: flex; gap: 1rem;">
                        <button type="submit" id="submit-btn" class="btn" style="flex: 1;">Publish Course</button>
                        <button type="button" id="cancel-btn" class="btn" style="background: transparent; border: 1.5px solid rgba(255,255,255,0.1); color: #ccc; display: none;">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="manager-card" style="background: transparent;">
                <h3>Current Courses</h3>
                <div style="margin-top: 2rem;" id="courses-list"></div>
            </div>
        </div>
    </main>

    <script>
        if (localStorage.getItem('nic_admin_auth') !== 'true') { window.location.href = 'admin-login.html'; }

        const coursesList = document.getElementById('courses-list');
        const courseForm = document.getElementById('course-form');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const previewImg = document.getElementById('preview-img');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const formTitle = document.getElementById('form-title');

        let editingCourseId = null;
        let existingCoverUrl = "";

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        loadCourses();

        async function loadCourses() {
            try {
                const { data, error } = await nic_supabase
                    .from('academy_journal')
                    .select('*')
                    .eq('hub_tag', '[COURSE]')
                    .order('publish_date', { ascending: false });

                if (error) throw error;
                let html = '';
                data.forEach(post => {
                    const parts = post.story_body.split('|');
                    const duration = parts[0] || '';
                    const level = parts[1] || '';
                    const price = parts[2] || '';
                    const desc = parts[3] || '';
                    const iconClass = parts[4] || 'fas fa-mug-hot';
                    
                    html += `
                        <div style="padding: 1.2rem; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.05);">
                            <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
                                ${post.cover_image ? 
                                    `<img src="${post.cover_image}" style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover;">` :
                                    `<div style="width: 50px; height: 50px; border-radius: 8px; background: rgba(193, 154, 107, 0.1); display: flex; align-items: center; justify-content: center; color: var(--secondary);"><i class="${iconClass}"></i></div>`
                                }
                                <div>
                                    <h5 style="margin: 0; font-size: 0.95rem; color: #fff;">${post.headline}</h5>
                                    <span style="font-size: 0.7rem; color: var(--secondary); font-weight: 600;">${duration} / ${level} • KES ${price}</span>
                                </div>
                            </div>
                            <div style="display: flex; justify-content: flex-end; gap: 1rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 0.8rem;">
                                <button onclick="startEditCourse('${post.id}', '${encodeURIComponent(post.headline)}', '${encodeURIComponent(duration)}', '${encodeURIComponent(level)}', '${encodeURIComponent(price)}', '${encodeURIComponent(iconClass)}', '${encodeURIComponent(post.cover_image || '')}', '${encodeURIComponent(desc)}')" style="background: none; border: none; color: var(--secondary); cursor: pointer; font-size: 0.8rem; font-weight: 600;"><i class="fas fa-edit"></i> Edit</button>
                                <button onclick="deleteCourse('${post.id}')" style="background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 0.8rem; font-weight: 600;"><i class="fas fa-trash"></i> Delete</button>
                            </div>
                        </div>
                    `;
                });
                coursesList.innerHTML = html || '<p style="color: var(--text-muted); font-size: 0.85rem;">No dynamic courses published yet. Showing default standard courses on public site.</p>';
            } catch (err) { console.error(err); }
        }

        window.startEditCourse = (id, title, duration, level, price, iconClass, coverUrl, desc) => {
            editingCourseId = id;
            document.getElementById('course-title').value = decodeURIComponent(title);
            document.getElementById('course-duration').value = decodeURIComponent(duration);
            document.getElementById('course-level').value = decodeURIComponent(level);
            document.getElementById('course-price').value = decodeURIComponent(price);
            document.getElementById('course-icon-class').value = decodeURIComponent(iconClass);
            document.getElementById('course-description').value = decodeURIComponent(desc);
            
            existingCoverUrl = decodeURIComponent(coverUrl);
            if (existingCoverUrl) {
                previewImg.src = existingCoverUrl;
                previewImg.style.display = 'block';
            } else {
                previewImg.style.display = 'none';
            }

            formTitle.innerText = "Edit Course Program";
            submitBtn.innerText = "Save Course Changes";
            cancelBtn.style.display = "inline-block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        cancelBtn.onclick = () => {
            resetFormState();
        };

        function resetFormState() {
            editingCourseId = null;
            existingCoverUrl = "";
            courseForm.reset();
            previewImg.style.display = 'none';
            formTitle.innerText = "Add Course Program";
            submitBtn.innerText = "Publish Course";
            cancelBtn.style.display = "none";
        }

        courseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = submitBtn;
            btn.innerText = editingCourseId ? 'Saving...' : 'Publishing...';
            btn.disabled = true;

            try {
                let publicUrl = existingCoverUrl;
                const file = fileInput.files[0];
                
                if (file) {
                    const fileName = `course_${Date.now()}_${file.name}`;
                    const { data: uploadData, error: uploadError } = await nic_supabase.storage
                        .from('media')
                        .upload(fileName, file);

                    if (uploadError) throw uploadError;
                    const { data: { publicUrl: newUrl } } = nic_supabase.storage.from('media').getPublicUrl(fileName);
                    publicUrl = newUrl;
                }

                const title = document.getElementById('course-title').value;
                const duration = document.getElementById('course-duration').value;
                const level = document.getElementById('course-level').value;
                const price = document.getElementById('course-price').value;
                const iconClass = document.getElementById('course-icon-class').value;
                const desc = document.getElementById('course-description').value;

                // Pack parameters cleanly into story_body
                const combinedBody = `${duration}|${level}|${price}|${desc}|${iconClass}`;

                if (editingCourseId) {
                    // Update existing
                    const { error: dbError } = await nic_supabase
                        .from('academy_journal')
                        .update({
                            headline: title,
                            cover_image: publicUrl,
                            story_body: combinedBody
                        })
                        .eq('id', editingCourseId);

                    if (dbError) throw dbError;
                    alert('Success! Course updated.');
                } else {
                    // Insert new
                    const { error: dbError } = await nic_supabase.from('academy_journal').insert([
                        { 
                            headline: title, 
                            hub_tag: '[COURSE]', 
                            cover_image: publicUrl, 
                            story_body: combinedBody 
                        }
                    ]);

                    if (dbError) throw dbError;
                    alert('Success! Course program published.');
                }

                resetFormState();
                loadCourses();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.innerText = editingCourseId ? 'Save Course Changes' : 'Publish Course';
                btn.disabled = false;
            }
        });

        window.deleteCourse = async (id) => {
            if (confirm('Delete this course permanently?')) {
                try {
                    const queryId = isNaN(id) ? id : Number(id);
                    console.log('Attempting to delete course with ID:', queryId);
                    const { error } = await nic_supabase.from('academy_journal').delete().eq('id', queryId);
                    if (error) {
                        console.error('Database delete error:', error);
                        alert('Delete failed: ' + error.message);
                    } else {
                        loadCourses();
                    }
                } catch (err) {
                    console.error('Caught error during delete:', err);
                    alert('An unexpected error occurred: ' + err.message);
                }
            }
        };

        // Dynamic Mobile Sidebar Navigation & Hamburger Setup
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.querySelector('.admin-sidebar');
            if (sidebar) {
                // 1. Create Mobile Top Bar
                const mobileHeader = document.createElement('div');
                mobileHeader.className = 'admin-mobile-header';
                mobileHeader.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 0.8rem;">
                        <img src="tess.jpeg" style="height: 32px; border-radius: 4px; object-fit: cover;">
                        <span style="font-weight: 800; letter-spacing: 1px; font-size: 0.9rem; color: #fff;">NIC ADMIN</span>
                    </div>
                    <button id="admin-hamburger" style="background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; padding: 0.5rem;">
                        <i class="fas fa-bars"></i>
                    </button>
                `;
                document.body.prepend(mobileHeader);

                // 2. Create Overlay
                const overlay = document.createElement('div');
                overlay.className = 'admin-overlay';
                document.body.appendChild(overlay);

                // 3. Create Close Button inside Sidebar
                const closeBtn = document.createElement('i');
                closeBtn.className = 'fas fa-times close-sidebar';
                sidebar.prepend(closeBtn);

                // 4. Bind Toggle Events
                const hamburger = document.getElementById('admin-hamburger');
                const openSidebar = () => {
                    sidebar.classList.add('open');
                    overlay.classList.add('active');
                };
                const closeSidebar = () => {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('active');
                };

                hamburger.addEventListener('click', openSidebar);
                closeBtn.addEventListener('click', closeSidebar);
                overlay.addEventListener('click', closeSidebar);
            }
        });
    </script>
</body>
</html>
